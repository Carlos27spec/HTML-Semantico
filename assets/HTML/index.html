<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/CSS/style.css" />
    <script src="/assets/JS/script.js" defer></script>
    <title>Página</title>
  </head>

  <body>
    <header>
      <p>Receitas Deliciosas</p>
      <form id="Pesquisa" onsubmit="cardapio(event)">
        <input type="text" id="Receita" />
        <button type="submit">Buscar</button>
      </form>
    </header>
    <section>
      <h1>Descubra como fazer as melhores comidas com as melhores receitas.</h1>
    </section>
    <main>
      <div id="container">
        <img
          src="https://cdn.goomer.com.br/website/base/729/833/2f0/cozinha-de-restaurante.jpg"
          id="Comida"
        />
        <div>
          <p>Nome:<span id="Nome"></span></p>
          <p>ID:<span id="ID"></span></p>
          <p>
            <label for="toggleIngredientes" style="cursor: pointer"
              >Ingredientes ▼</label
            >
            <input
              type="checkbox"
              id="toggleIngredientes"
              style="display: none"
            />
            <span id="Ingredientes"></span>
          </p>
          <p>Avaliação:<span id="Avaliacao"></span></p>
          <p>Categoria:<span id="Categoria"></span></p>
          <div id="button">
            <button type="button" onclick="voltar()">Voltar</button>
            <button type="button" onclick="avancar()">Avançar</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
